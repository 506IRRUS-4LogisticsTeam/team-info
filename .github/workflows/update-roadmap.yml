name: Update Roadmap

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-roadmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PROJECT_PAT }}

      - name: Generate roadmap from project board
        uses: actions/github-script@v7
        env:
          PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
        with:
          script: |
            const fs = require('fs');

            const org = '506IRRUS-4LogisticsTeam';
            const projectNumber = 6;

            const visibleStatuses = [
              'In Progress',
              'In S-4 Review',
              'Complete and Implemented',
            ];

            const statusOrder = {};
            visibleStatuses.forEach((s, i) => statusOrder[s.toLowerCase()] = i);

            const query = `
              query($org: String!, $number: Int!, $cursor: String) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    items(first: 100, after: $cursor) {
                      pageInfo { hasNextPage endCursor }
                      nodes {
                        fieldValueByName(name: "Status") {
                          ... on ProjectV2ItemFieldSingleSelectValue {
                            name
                          }
                        }
                        content {
                          ... on Issue {
                            title
                            assignees(first: 5) {
                              nodes { login }
                            }
                          }
                          ... on DraftIssue {
                            title
                            assignees(first: 5) {
                              nodes { login }
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }
            `;

            const pat = process.env.PROJECT_PAT;

            async function graphqlQuery(query, variables) {
              const resp = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: {
                  'Authorization': `bearer ${pat}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              const json = await resp.json();
              if (json.errors) {
                throw new Error(JSON.stringify(json.errors));
              }
              return json.data;
            }

            let allItems = [];
            let cursor = null;

            while (true) {
              const result = await graphqlQuery(query, {
                org,
                number: projectNumber,
                cursor,
              });

              const items = result.organization.projectV2.items;
              allItems.push(...items.nodes);

              if (items.pageInfo.hasNextPage) {
                cursor = items.pageInfo.endCursor;
              } else {
                break;
              }
            }

            const roadmapItems = allItems.filter(item => {
              const status = item.fieldValueByName?.name;
              return status && visibleStatuses.some(s => s.toLowerCase() === status.toLowerCase());
            });

            roadmapItems.sort((a, b) => {
              const aStatus = a.fieldValueByName?.name || '';
              const bStatus = b.fieldValueByName?.name || '';
              const aOrder = statusOrder[aStatus.toLowerCase()] ?? 99;
              const bOrder = statusOrder[bStatus.toLowerCase()] ?? 99;
              return aOrder - bOrder;
            });

            // Group items by status
            const groups = {};
            for (const s of visibleStatuses) {
              groups[s.toLowerCase()] = [];
            }

            for (const item of roadmapItems) {
              const status = item.fieldValueByName?.name || '';
              const key = status.toLowerCase();
              if (groups[key]) {
                const title = item.content?.title || 'Draft';
                // Skip MOD REQUEST and MOD VALIDATION items
                if (/MOD REQUEST|MOD VALIDATION/i.test(title)) continue;
                const assignees = item.content?.assignees?.nodes;
                const assignee = assignees && assignees.length > 0
                  ? assignees.map(a => a.login).join(', ')
                  : '—';
                groups[key].push({ title, assignee });
              }
            }

            let output = '';

            // In Progress
            const inProgress = groups['in progress'];
            if (inProgress.length > 0) {
              output += '### 🔧 In Progress\n\n';
              output += '| Item | Assignee |\n';
              output += '|------|----------|\n';
              for (const item of inProgress) {
                output += `| ${item.title} | ${item.assignee} |\n`;
              }
              output += '\n';
            }

            // In S-4 Review
            const inReview = groups['in s-4 review'];
            if (inReview.length > 0) {
              output += '### 🔍 In S-4 Review\n\n';
              output += '| Item | Assignee |\n';
              output += '|------|----------|\n';
              for (const item of inReview) {
                output += `| ${item.title} | ${item.assignee} |\n`;
              }
              output += '\n';
            }

            // Complete — collapsible
            const complete = groups['complete and implemented'];
            if (complete.length > 0) {
              output += '<details markdown="1">\n';
              output += '<summary><strong>✅ Complete and Implemented</strong> (' + complete.length + ' items)</summary>\n\n';
              output += '| Item | Assignee |\n';
              output += '|------|----------|\n';
              for (const item of complete) {
                output += `| ${item.title} | ${item.assignee} |\n`;
              }
              output += '\n</details>\n';
            }

            if (inProgress.length === 0 && inReview.length === 0 && complete.length === 0) {
              output += '_No active roadmap items._\n';
            }

            const table = output;

            const startMarker = '<!-- ROADMAP:START - Do not remove or modify this section -->';
            const endMarker = '<!-- ROADMAP:END - Do not remove or modify this section -->';

            const readme = fs.readFileSync('README.md', 'utf8');
            const rStart = readme.indexOf(startMarker);
            const rEnd = readme.indexOf(endMarker);

            if (rStart === -1 || rEnd === -1) {
              core.setFailed('Could not find ROADMAP markers in README.md');
              return;
            }

            const updatedReadme = readme.substring(0, rStart + startMarker.length) +
              '\n' + table +
              readme.substring(rEnd);
            fs.writeFileSync('README.md', updatedReadme);

            const indexPath = 'index.md';
            if (fs.existsSync(indexPath)) {
              const index = fs.readFileSync(indexPath, 'utf8');
              const iStart = index.indexOf(startMarker);
              const iEnd = index.indexOf(endMarker);
              if (iStart !== -1 && iEnd !== -1) {
                const updatedIndex = index.substring(0, iStart + startMarker.length) +
                  '\n' + table +
                  index.substring(iEnd);
                fs.writeFileSync(indexPath, updatedIndex);
              }
            }

            core.info(`Updated roadmap with ${roadmapItems.length} items`);

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md index.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update roadmap from project board"
          git push
